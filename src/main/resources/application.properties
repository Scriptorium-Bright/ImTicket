spring.application.name=ticket

#SMS
coolsms.api.key=${COOLSMS_API_KEY:dummy-coolsms-key}
coolsms.api.secret=${COOLSMS_API_SECRET:dummy-coolsms-secret}
coolsms.api.from=${COOLSMS_API_FROM:01000000000}
ticket.sms.allow-test-code=${TICKET_SMS_ALLOW_TEST_CODE:false}

# NFT
infura.url=${INFURA_URL:}
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY:}
solidity.contract.address=${SOLIDITY_CONTRACT_ADDRESS:}

#JPA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:10046/capstone?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:capstone}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# batch insert properties (jpa)
spring.jpa.properties.hibernate.jdbc.batch_size=30

# Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# ??? ?? ????? ?? ??
spring.jpa.generate-ddl=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.type.descriptor.sql=trace

# secret Key
spring.jwt.secret=${SPRING_JWT_SECRET:change-me-jwt-secret-change-me-jwt-secret-change-me-jwt-secret}
ticket.entry.secret=${TICKET_ENTRY_SECRET:change-me-entry-secret}

# Redis Setting
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

#Log
logging.level.org.springframework.security=debug
logging.level.org.springframework.web.filter=debug
logging.level.org.springframework.web=debug
logging.level.org.apache.catalina=debug
logging.level.org.apache.coyote=debug
logging.level.org.example.ticket.member.signature.service=trace

# photo
spring.servlet.multipart.enabled = true
spring.servlet.multipart.location = ${SPRING_SERVLET_MULTIPART_LOCATION:/Users/jeonjeonghyeon/bootPhoto}
spring.servlet.multipart.max-request-size = 10MB
spring.servlet.multipart.max-file-size = 1MB
ticket.upload.path = ${TICKET_UPLOAD_PATH:/Users/jeonjeonghyeon/bootPhoto/uploads}


# connection pool

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:30}


spring.jwt.expired.time = 360000000
server.port=10080

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
